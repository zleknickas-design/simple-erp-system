{% extends "base.html" %}

{% block title %}Registracija - Paprasta ERP Sistema{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Registracija</h2>
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Vartotojo vardas</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Elektroninis paštas</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Slaptažodis</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Patvirtinti slaptažodį</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Registruotis</button>
                </form>
                <p class="text-center mt-3">
                    Jau turite paskyrą? <a href="{{ url_for('auth.login') }}">Prisijunkite čia</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
