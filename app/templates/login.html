{% extends "base.html" %}

{% block title %}Prisijungimas - Paprasta ERP Sistema{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Prisijungimas</h2>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Vartotojo vardas</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Slaptažodis</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Prisijungti</button>
                </form>
                <p class="text-center mt-3">
                    Neturite paskyros? <a href="{{ url_for('auth.register') }}">Registruokitės čia</a>
                </p>
                <p class="text-muted text-center mt-3 small">
                    Demonstracinis prisijungimas:<br>Vartotojo vardas: <strong>admin</strong><br>Slaptažodis: <strong>admin123</strong>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
