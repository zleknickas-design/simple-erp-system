{% extends "base.html" %}

{% block title %}{% if supplier %}Edit{% else %}Add{% endif %} Supplier - Simple ERP System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="mb-4">{% if supplier %}Edit{% else %}Add New{% endif %} Supplier</h1>
        
        <form method="POST" class="needs-validation">
            <div class="card">
                <div class="card-body">
                    <div class="mb-3">
                        <label for="name" class="form-label">Supplier Name</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ supplier.name if supplier else '' }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="contact_person" class="form-label">Contact Person</label>
                            <input type="text" class="form-control" id="contact_person" name="contact_person" value="{{ supplier.contact_person if supplier else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ supplier.email if supplier else '' }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" name="phone" value="{{ supplier.phone if supplier else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="tax_id" class="form-label">Tax ID</label>
                            <input type="text" class="form-control" id="tax_id" name="tax_id" value="{{ supplier.tax_id if supplier else '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <input type="text" class="form-control" id="address" name="address" value="{{ supplier.address if supplier else '' }}">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="city" class="form-label">City</label>
                            <input type="text" class="form-control" id="city" name="city" value="{{ supplier.city if supplier else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="country" class="form-label">Country</label>
                            <input type="text" class="form-control" id="country" name="country" value="{{ supplier.country if supplier else '' }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="payment_terms" class="form-label">Payment Terms</label>
                        <input type="text" class="form-control" id="payment_terms" name="payment_terms" placeholder="e.g., Net 30, Net 60" value="{{ supplier.payment_terms if supplier else '' }}">
                    </div>
                </div>
                <div class="card-footer">
                    <a href="{{ url_for('suppliers.suppliers_list') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">{% if supplier %}Update{% else %}Create{% endif %} Supplier</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
